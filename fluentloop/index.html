<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#f7f8f5">
<meta name="description" content="A phrase-first French speaking coach.">
<title>FluentLoop</title>
<style>
:root{--paper:#f7f8f5;--surface:#fff;--ink:#17211c;--muted:#6f7a73;--line:#e2e6e1;--green:#236747;--green2:#174a34;--soft:#e8f3ed;--amber:#a65e1c;--amber-soft:#fff1e2;--red:#9f4540;--shadow:0 18px 60px rgba(35,52,43,.09)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--paper);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}button,input{font:inherit}button{color:inherit}button:focus-visible,input:focus-visible{outline:3px solid rgba(35,103,71,.22);outline-offset:2px}
body{background:radial-gradient(circle at 10% 0%,rgba(204,231,216,.7),transparent 28%),radial-gradient(circle at 96% 100%,rgba(222,233,226,.75),transparent 32%),var(--paper)}
.app{min-height:100dvh;width:min(100%,640px);margin:auto;background:rgba(255,255,255,.76);backdrop-filter:blur(18px);position:relative;overflow:hidden}.screen{min-height:100dvh;padding:max(22px,env(safe-area-inset-top)) 20px max(28px,env(safe-area-inset-bottom));animation:enter .38s ease both}@keyframes enter{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.header{height:46px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:760;letter-spacing:-.03em}.brandmark{width:31px;height:31px;border-radius:10px;display:grid;place-items:center;background:var(--green);color:#fff;box-shadow:0 8px 18px rgba(35,103,71,.18);font-weight:800}.icon{width:42px;height:42px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.7);display:grid;place-items:center;cursor:pointer}.icon:active,.btn:active,.pack:active{transform:scale(.98)}
.hero{padding:58px 2px 34px}.kicker{font-size:11px;font-weight:760;letter-spacing:.14em;text-transform:uppercase;color:var(--green)}h1{margin:12px 0 14px;font-size:clamp(40px,10vw,58px);line-height:.98;letter-spacing:-.065em;font-weight:760}.hero p{max-width:470px;margin:0;color:var(--muted);font-size:17px;line-height:1.62}.mode{display:flex;gap:4px;background:#edf0ec;padding:4px;border-radius:14px;margin:24px 0 18px}.mode button{flex:1;border:0;border-radius:11px;padding:11px 12px;background:transparent;color:var(--muted);font-weight:690;cursor:pointer}.mode button.active{background:#fff;color:var(--ink);box-shadow:0 4px 15px rgba(38,54,46,.08)}
.section-title{font-size:12px;font-weight:760;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:4px 2px 10px}.packs{display:grid;gap:10px}.pack{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.84);border-radius:20px;padding:17px 17px 16px;text-align:left;display:grid;grid-template-columns:1fr auto;gap:4px 14px;align-items:center;cursor:pointer;box-shadow:0 8px 24px rgba(35,52,43,.035);transition:.2s}.pack:hover{border-color:#cfd8d1;transform:translateY(-1px);box-shadow:var(--shadow)}.pack strong{font-size:17px;letter-spacing:-.025em}.pack p{grid-column:1/2;margin:1px 0 0;color:var(--muted);font-size:13px;line-height:1.45}.pill{grid-row:1/3;grid-column:2;padding:7px 9px;border-radius:999px;background:var(--soft);color:var(--green);font-size:11px;font-weight:760}.real-progress{margin-top:22px;padding:15px 16px;border-radius:17px;background:rgba(232,243,237,.65);display:flex;justify-content:space-between;align-items:center;color:var(--green2);font-size:13px}.real-progress b{font-size:14px}
.lesson{display:flex;flex-direction:column}.lesson-head{height:54px;display:grid;grid-template-columns:44px 1fr 44px;align-items:center;gap:12px}.position{text-align:center}.position b{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}.track{height:4px;background:#e9ede8;border-radius:99px;margin-top:8px;overflow:hidden}.track i{display:block;height:100%;background:var(--green);border-radius:inherit;transition:width .45s ease}.lesson-main{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;padding:26px 0 12px}.stage{min-height:360px;display:grid;place-items:center;text-align:center;position:relative}.stage-inner{width:100%;max-width:520px;padding:24px 10px}.phase{font-size:11px;font-weight:760;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:19px}.phrase{font-size:clamp(31px,8vw,47px);line-height:1.16;letter-spacing:-.045em;font-weight:720;min-height:120px;display:grid;place-items:center;transition:opacity .38s ease,transform .38s ease}.phrase.hidden{opacity:0;transform:translateY(8px);pointer-events:none}.turn-ring{width:88px;height:88px;margin:4px auto 25px;border-radius:50%;display:grid;place-items:center;background:var(--soft);color:var(--green);position:relative}.turn-ring:before,.turn-ring:after{content:"";position:absolute;border:1px solid rgba(35,103,71,.22);border-radius:50%;inset:-10px;animation:pulse 2s ease-out infinite}.turn-ring:after{inset:-22px;animation-delay:.5s}@keyframes pulse{0%{opacity:.75;transform:scale(.85)}100%{opacity:0;transform:scale(1.12)}}.turn-ring.listening{background:var(--green);color:#fff}.turn-ring.listening:before,.turn-ring.listening:after{border-color:rgba(35,103,71,.55)}.turn-icon{font-size:34px;line-height:1}.prompt{font-size:17px;font-weight:720;margin-bottom:8px}.subprompt{color:var(--muted);font-size:14px;line-height:1.5;min-height:42px}.feedback{max-width:480px;margin:16px auto 0;padding:14px 16px;border-radius:15px;background:#f0f3ef;color:var(--muted);font-size:14px;line-height:1.5}.feedback.good{background:var(--soft);color:var(--green2)}.feedback.retry{background:var(--amber-soft);color:var(--amber)}
.controls{padding:8px 0 0}.btn{width:100%;border:0;border-radius:17px;padding:16px 18px;background:var(--green);color:#fff;font-weight:760;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;box-shadow:0 12px 28px rgba(35,103,71,.2);transition:.18s}.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none}.btn[disabled]{opacity:.48;cursor:not-allowed}.micro-actions{display:flex;justify-content:center;gap:8px;margin-top:12px}.textbtn{border:0;background:transparent;color:var(--muted);padding:9px 10px;border-radius:10px;font-size:13px;font-weight:660;cursor:pointer}.textbtn:hover{background:#edf1ed;color:var(--ink)}.type-row{display:flex;gap:8px;margin-top:10px;animation:enter .25s ease}.type-row input{min-width:0;flex:1;border:1px solid var(--line);border-radius:15px;padding:14px 15px;background:#fff;color:var(--ink)}.type-row button{width:50px;border:0;border-radius:15px;background:var(--green);color:#fff;font-weight:800;cursor:pointer}
.overlay{position:absolute;inset:0;background:rgba(247,248,245,.94);backdrop-filter:blur(16px);z-index:20;padding:max(28px,env(safe-area-inset-top)) 20px;display:flex;flex-direction:column;animation:enter .25s ease}.settings h2{font-size:29px;letter-spacing:-.045em;margin:36px 0 8px}.settings p{color:var(--muted);line-height:1.55}.setting{margin-top:22px;padding:17px;border:1px solid var(--line);border-radius:18px;background:#fff;display:flex;align-items:center;justify-content:space-between;gap:18px}.setting div strong{display:block;margin-bottom:4px}.setting div span{color:var(--muted);font-size:13px}.switch{width:50px;height:30px;border:0;border-radius:99px;background:#dce2dd;padding:3px;cursor:pointer}.switch i{display:block;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 2px 7px rgba(0,0,0,.13);transition:.2s}.switch.on{background:var(--green)}.switch.on i{transform:translateX(20px)}
.complete{display:grid;place-items:center;text-align:center}.check{width:84px;height:84px;border-radius:50%;display:grid;place-items:center;margin:auto;background:var(--green);color:#fff;font-size:38px;box-shadow:0 20px 50px rgba(35,103,71,.22)}.complete h1{font-size:48px;margin:27px 0 12px}.complete p{color:var(--muted);line-height:1.6;margin:0 auto;max-width:430px}.results{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:28px 0}.result{padding:17px 9px;border:1px solid var(--line);border-radius:17px;background:#fff}.result b{display:block;font-size:23px;letter-spacing:-.04em}.result span{font-size:11px;color:var(--muted)}.complete .btn+.btn{margin-top:9px}
.toast{position:fixed;left:50%;bottom:max(24px,env(safe-area-inset-bottom));transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 15px;border-radius:13px;font-size:13px;z-index:50;box-shadow:0 15px 38px rgba(0,0,0,.18);animation:toast .25s ease both}@keyframes toast{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
@media(min-width:700px){.app{min-height:calc(100dvh - 34px);margin:17px auto;border:1px solid rgba(35,52,43,.08);border-radius:30px;box-shadow:0 35px 90px rgba(35,52,43,.12)}.screen{min-height:calc(100dvh - 36px);padding-left:34px;padding-right:34px}.pack{padding:19px}.lesson-main{padding-left:20px;padding-right:20px}}
@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
</style>
</head>
<body><main class="app" id="app"></main>
<script>
const PACKS=[
{id:'work',title:'Work & meetings',description:'Scheduling, documents and everyday office French.',phrases:[['I have a meeting at ten thirty.','J’ai une réunion à dix heures et demie.'],['I’m going to send you the document separately.','Je vais t’envoyer le document séparément.'],['I have to finish this work before five o’clock.','Je dois finir ce travail avant cinq heures.'],['Can you explain that to me?','Est-ce que tu peux m’expliquer ça ?'],['I’m available tomorrow afternoon.','Je suis disponible demain après-midi.'],['I’ll call you back a little later.','Je vais te rappeler un peu plus tard.'],['I understand what you’re asking.','Je comprends ce que tu demandes.'],['I just need your confirmation.','J’ai seulement besoin de ta confirmation.']]},
{id:'everyday',title:'Everyday conversation',description:'Plans, friends, opinions and natural small talk.',phrases:[['I saw my friends last weekend.','J’ai vu mes amis le week-end dernier.'],['I’m working today, but I’m free tomorrow evening.','Je travaille aujourd’hui, mais je suis libre demain soir.'],['That sounds like a good idea.','Ça me semble être une bonne idée.'],['I’m not sure yet.','Je ne suis pas encore sûr.'],['What are you doing this weekend?','Qu’est-ce que tu fais ce week-end ?'],['I stayed home because I was tired.','Je suis resté à la maison parce que j’étais fatigué.'],['I’ll see you tomorrow morning.','Je te verrai demain matin.'],['Take your time, there’s no rush.','Prends ton temps, il n’y a pas d’urgence.']]},
{id:'travel',title:'Travel & directions',description:'Arrival, transportation, hotels and asking for help.',phrases:[['We need to arrive a little early.','Nous devons arriver un peu en avance.'],['Where is the nearest train station?','Où est la gare la plus proche ?'],['I have a reservation under the name Scott.','J’ai une réservation au nom de Scott.'],['I think we’re going the wrong way.','Je pense que nous allons dans la mauvaise direction.'],['Could you call a taxi for me?','Pourriez-vous m’appeler un taxi ?'],['How long does it take to get there?','Combien de temps faut-il pour y aller ?'],['Is the room ready now?','Est-ce que la chambre est prête maintenant ?'],['Can you help me with this bag?','Est-ce que vous pouvez m’aider avec ce sac ?']]},
{id:'food',title:'Food & restaurants',description:'Ordering, preferences, questions and paying the bill.',phrases:[['I’d like to have a coffee near here.','J’aimerais prendre un café près d’ici.'],['A table for two, please.','Une table pour deux, s’il vous plaît.'],['What do you recommend?','Qu’est-ce que vous recommandez ?'],['Could I have that without cheese?','Est-ce que je pourrais avoir ça sans fromage ?'],['Could we have some water, please?','Est-ce que nous pourrions avoir de l’eau, s’il vous plaît ?'],['Everything was delicious.','Tout était délicieux.'],['Could we have the bill, please?','Est-ce que nous pourrions avoir l’addition, s’il vous plaît ?'],['Can I pay by card?','Est-ce que je peux payer par carte ?']]}];
const app=document.getElementById('app');let state={screen:'library',mode:localStorage.getItem('fl-mode')||'guided',pack:null,index:0,phase:'idle',attempts:0,correct:0,scores:[],typed:false,settings:false,slow:localStorage.getItem('fl-slow')==='1',token:0,started:0};let progress=JSON.parse(localStorage.getItem('fl-progress')||'{"sessions":0,"attempts":0,"correct":0,"mastered":{}}');let recognition=null;const icon=name=>({back:'←',gear:'⚙',mic:'●',sound:'◖',eye:'◎',type:'⌨',close:'×'}[name]||name);function save(){localStorage.setItem('fl-progress',JSON.stringify(progress));localStorage.setItem('fl-mode',state.mode);localStorage.setItem('fl-slow',state.slow?'1':'0')}function stop(){state.token++;try{recognition&&recognition.abort()}catch{}recognition=null;if('speechSynthesis'in window)speechSynthesis.cancel()}function speak(text,lang='fr-FR',rate){return new Promise(res=>{if(!('speechSynthesis'in window)){res();return}const u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=rate||(state.slow?.68:.82);u.onend=res;u.onerror=res;speechSynthesis.speak(u)})}const wait=ms=>new Promise(r=>setTimeout(r,ms));function normalize(v){return v.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[’']/g,' ').replace(/[^a-z0-9\s-]/gi,' ').replace(/\s+/g,' ').trim()}function distance(a,b){const m=Array.from({length:b.length+1},(_,r)=>[r]);for(let c=0;c<=a.length;c++)m[0][c]=c;for(let r=1;r<=b.length;r++)for(let c=1;c<=a.length;c++)m[r][c]=b[r-1]===a[c-1]?m[r-1][c-1]:Math.min(m[r-1][c-1],m[r][c-1],m[r-1][c])+1;return m[b.length][a.length]}function score(answer,target){const a=normalize(answer),b=normalize(target);if(!a)return 0;const char=1-distance(a,b)/Math.max(a.length,b.length,1),tw=new Set(b.split(' ')),aw=new Set(a.split(' ')),words=[...tw].filter(w=>aw.has(w)).length/tw.size;return Math.max(0,Math.min(1,char*.48+words*.52))}function toast(text){const el=document.createElement('div');el.className='toast';el.textContent=text;document.body.append(el);setTimeout(()=>el.remove(),1800)}function home(){stop();state={...state,screen:'library',pack:null,index:0,phase:'idle',typed:false,settings:false};render()}function render(){if(state.screen==='library')renderLibrary();else if(state.screen==='lesson')renderLesson();else renderComplete()}
function renderLibrary(){const mastered=Object.keys(progress.mastered||{}).length,accuracy=progress.attempts?Math.round(progress.correct/progress.attempts*100):0;app.innerHTML=`<section class="screen"><header class="header"><div class="brand"><span class="brandmark">F</span>FluentLoop</div><button class="icon" id="settings" aria-label="Settings">${icon('gear')}</button></header><div class="hero"><span class="kicker">French speaking coach</span><h1>One phrase.<br>Then your turn.</h1><p>Hear useful French, let it disappear, and say it from memory. The app corrects you and keeps going.</p></div><div class="mode"><button data-mode="guided" class="${state.mode==='guided'?'active':''}">Guided</button><button data-mode="recall" class="${state.mode==='recall'?'active':''}">Recall</button></div><div class="section-title">Choose a phrase pack</div><div class="packs">${PACKS.map(p=>`<button class="pack" data-pack="${p.id}"><strong>${p.title}</strong><p>${p.description}</p><span class="pill">8 phrases</span></button>`).join('')}</div><div class="real-progress"><span>Real device progress</span><b>${progress.sessions} sessions · ${mastered} mastered${progress.attempts?` · ${accuracy}%`:''}</b></div></section>${state.settings?settingsMarkup():''}`;document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;save();render()});document.querySelectorAll('[data-pack]').forEach(b=>b.onclick=()=>startPack(b.dataset.pack));document.getElementById('settings').onclick=()=>{state.settings=true;render()};bindSettings()}
function settingsMarkup(){return `<div class="overlay settings"><header class="header"><div class="brand">Settings</div><button class="icon" id="close-settings">${icon('close')}</button></header><h2>Keep it simple.</h2><p>These settings change how the coach speaks. Progress stays only on this device.</p><div class="setting"><div><strong>Slow French audio</strong><span>Use a slower voice while rebuilding vocabulary.</span></div><button class="switch ${state.slow?'on':''}" id="slow"><i></i></button></div><div class="setting"><div><strong>Reset progress</strong><span>Erase completed sessions and phrase mastery.</span></div><button class="textbtn" id="reset">Reset</button></div></div>`}function bindSettings(){const close=document.getElementById('close-settings');if(close)close.onclick=()=>{state.settings=false;render()};const slow=document.getElementById('slow');if(slow)slow.onclick=()=>{state.slow=!state.slow;save();render()};const reset=document.getElementById('reset');if(reset)reset.onclick=()=>{if(confirm('Reset all FluentLoop progress on this device?')){progress={sessions:0,attempts:0,correct:0,mastered:{}};save();state.settings=false;render();toast('Progress reset')}}}function startPack(id){stop();state={...state,screen:'lesson',pack:PACKS.find(p=>p.id===id)||PACKS[0],index:0,phase:'idle',attempts:0,correct:0,scores:[],typed:false,started:Date.now()};render();setTimeout(runPhrase,300)}
function renderLesson(){const p=state.pack.phrases[state.index],pct=(state.index+1)/state.pack.phrases.length*100;let phaseLabel='',content='',feedback='';if(state.phase==='idle'||state.phase==='english'){phaseLabel='English';content=p[0]}else if(state.phase==='french'){phaseLabel='French';content=p[1]}else if(['turn','listening','checking','retry','correct'].includes(state.phase)){phaseLabel=state.phase==='correct'?'Correct':state.phase==='retry'?'Try again':'Your turn';content=`<div class="turn-ring ${state.phase==='listening'?'listening':''}"><span class="turn-icon">${state.phase==='correct'?'✓':state.phase==='listening'?'●':'◉'}</span></div><div class="prompt">${state.phase==='listening'?'Listening…':state.phase==='checking'?'Checking…':state.phase==='correct'?'That was clear.':state.phase==='retry'?'Say the full phrase again.':'Say it in French.'}</div><div class="subprompt">${state.phase==='turn'?'The phrase is hidden. Retrieve it from memory.':''}</div>`;if(state.feedback)feedback=`<div class="feedback ${state.phase==='correct'?'good':state.phase==='retry'?'retry':''}">${state.feedback}</div>`}app.innerHTML=`<section class="screen lesson"><header class="lesson-head"><button class="icon" id="back">${icon('back')}</button><div class="position"><b>${state.pack.title} · ${state.index+1} of ${state.pack.phrases.length}</b><div class="track"><i style="width:${pct}%"></i></div></div><button class="icon" id="settings">${icon('gear')}</button></header><div class="lesson-main"><div class="stage"><div class="stage-inner"><div class="phase">${phaseLabel}</div><div class="phrase ${content?'':'hidden'}">${content}</div>${feedback}</div></div></div><div class="controls">${['turn','retry'].includes(state.phase)?`<button class="btn" id="speak"><span>●</span> Speak in French</button>`:''}${state.phase==='listening'?`<button class="btn" disabled>Listening…</button>`:''}<div class="micro-actions"><button class="textbtn" id="replay">${icon('sound')} Replay</button>${state.mode==='recall'&&['turn','retry'].includes(state.phase)?`<button class="textbtn" id="reveal">${icon('eye')} Reveal</button>`:''}<button class="textbtn" id="typing">${icon('type')} Type</button></div>${state.typed?`<div class="type-row"><input id="answer" autocomplete="off" autocapitalize="none" placeholder="Type the French phrase"><button id="check">✓</button></div>`:''}</div></section>${state.settings?settingsMarkup():''}`;document.getElementById('back').onclick=home;document.getElementById('settings').onclick=()=>{stop();state.settings=true;render()};const s=document.getElementById('speak');if(s)s.onclick=listen;const r=document.getElementById('replay');if(r)r.onclick=()=>replay();const v=document.getElementById('reveal');if(v)v.onclick=()=>reveal();const t=document.getElementById('typing');if(t)t.onclick=()=>{state.typed=!state.typed;render();if(state.typed)setTimeout(()=>document.getElementById('answer').focus(),0)};const c=document.getElementById('check');if(c)c.onclick=()=>evaluate(document.getElementById('answer').value);const a=document.getElementById('answer');if(a)a.onkeydown=e=>{if(e.key==='Enter')evaluate(a.value)};bindSettings()}
async function runPhrase(){const token=++state.token,p=state.pack.phrases[state.index];state.phase='english';state.feedback='';render();await speak(p[0],'en-CA',.92);if(token!==state.token)return;await wait(500);if(state.mode==='guided'){state.phase='french';render();await speak(p[1]);if(token!==state.token)return;await wait(900)}state.phase='turn';render()}async function replay(){const p=state.pack.phrases[state.index];stop();state.phase='french';render();await speak(p[1]);await wait(650);state.phase='turn';render()}async function reveal(){const p=state.pack.phrases[state.index];stop();state.phase='french';render();await speak(p[1]);await wait(1100);state.phase='turn';render()}
function listen(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){state.typed=true;state.feedback='Speech recognition is unavailable in this browser. Type the phrase instead.';state.phase='retry';render();return}stop();state.phase='listening';render();recognition=new SR();recognition.lang='fr-FR';recognition.interimResults=false;recognition.maxAlternatives=3;recognition.onresult=e=>{const options=[...e.results[0]].map(x=>x.transcript);evaluate(options.sort((a,b)=>score(b,state.pack.phrases[state.index][1])-score(a,state.pack.phrases[state.index][1]))[0])};recognition.onerror=e=>{state.phase='retry';state.feedback=e.error==='not-allowed'?'Microphone permission is blocked. Allow it in Chrome or use typing.':'I could not hear that clearly. Tap the microphone and try again.';render()};recognition.onend=()=>{if(state.phase==='listening'){state.phase='retry';state.feedback='I did not catch a complete phrase. Try once more.';render()}};try{recognition.start()}catch{state.phase='retry';state.feedback='The microphone is already active. Try again.';render()}}
async function evaluate(answer){if(!answer.trim())return;stop();const target=state.pack.phrases[state.index][1],s=score(answer,target);state.attempts++;progress.attempts++;state.phase='checking';render();await wait(350);if(s>=.68){state.correct++;progress.correct++;state.scores.push(Math.round(s*100));progress.mastered[state.pack.id+'-'+state.index]=Math.max(progress.mastered[state.pack.id+'-'+state.index]||0,Math.round(s*100));state.phase='correct';state.feedback=`I heard “${answer}” · ${Math.round(s*100)}% match.`;save();render();await speak('Très bien !','fr-FR',.9);await wait(700);if(state.index>=state.pack.phrases.length-1)finish();else{state.index++;state.typed=false;state.phase='idle';render();setTimeout(runPhrase,300)}}else{state.phase='retry';state.feedback=`I heard “${answer}”. Listen to the model, then repeat the complete phrase.`;save();render();await wait(350);await speak(target);state.phase='turn';state.feedback='Try again. The phrase is hidden.';render()}}function finish(){stop();progress.sessions++;save();state.screen='complete';render()}function renderComplete(){const avg=state.scores.length?Math.round(state.scores.reduce((a,b)=>a+b,0)/state.scores.length):0;app.innerHTML=`<section class="screen complete"><div><div class="check">✓</div><span class="kicker" style="display:block;margin-top:28px">Session complete</span><h1>You produced the phrases.</h1><p>The score reflects active French you recalled and spoke—not taps or points.</p><div class="results"><div class="result"><b>${state.correct}/${state.pack.phrases.length}</b><span>phrases</span></div><div class="result"><b>${avg}%</b><span>average</span></div><div class="result"><b>${state.attempts}</b><span>attempts</span></div></div><button class="btn" id="again">Practise this pack again</button><button class="btn secondary" id="packs">Choose another pack</button></div></section>`;document.getElementById('again').onclick=()=>startPack(state.pack.id);document.getElementById('packs').onclick=home}render();
</script></body></html>
